services:
  core-engine:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env   # Provides secrets as environment variables for ${VAR} resolution
    volumes:
      - ./config.yaml:/app/config.yaml
      - ./workspace:/workspace
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
