services:
  core-engine:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - PROJECT_CWD=/workspace
      - MAX_SESSIONS=10
      - PREWARM_POOL_SIZE=2
      - LOG_LEVEL=INFO
    volumes:
      - ./workspace:/workspace
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
